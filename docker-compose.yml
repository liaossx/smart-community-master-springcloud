version: '3.8'

services:
  nginx:
    image: docker.m.daocloud.io/library/nginx:1.25-alpine
    container_name: smart-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - /opt/smart-community/nginx/conf.d:/etc/nginx/conf.d:ro
      - /opt/smart-community/frontend/web:/usr/share/nginx/html:ro
    depends_on:
      - gateway-service

  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: smart-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: smart_community
      TZ: Asia/Shanghai
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./sql/init_all.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max_connections=500

  redis:
    image: docker.m.daocloud.io/library/redis:6.2
    container_name: smart-redis
    restart: always
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Shanghai
    command: redis-server --requirepass 1234 --appendonly yes

  nacos:
    image: docker.m.daocloud.io/nacos/nacos-server:v2.2.0
    container_name: smart-nacos
    restart: always
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - ./nacos/data:/home/nacos/data
      - ./nacos/logs:/home/nacos/logs
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
      - ./nacos/conf/nacos-logback.xml:/home/nacos/conf/nacos-logback.xml
    environment:
      MODE: standalone
      AUTH_ENABLED: "false"
      PREFER_HOST_MODE: "ip"
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_PORT: "3306"
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: "1234"
    depends_on:
      - mysql

  rabbitmq:
    image: docker.m.daocloud.io/library/rabbitmq:3.9-management
    container_name: smart-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

#  sentinel:
