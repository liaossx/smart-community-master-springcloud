version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: smart-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: smart_community
      TZ: Asia/Shanghai
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./sql/init_all.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:6.2
    container_name: smart-redis
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Shanghai
    command: redis-server --requirepass 1234 --appendonly yes

  nacos:
    image: nacos/nacos-server:v2.2.0
    container_name: smart-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      AUTH_ENABLED: "false"
    volumes:
      - ./nacos/logs:/home/nacos/logs

  rabbitmq:
    image: rabbitmq:3.9-management
    container_name: smart-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  sentinel:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: smart-sentinel
    ports:
      - "8858:8858"
    environment:
      JAVA_OPTS: "-Dserver.port=8858 -Dcsp.sentinel.dashboard.server=localhost:8858 -Dproject.name=sentinel-dashboard"
