<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="860" viewBox="0 0 1100 860"
     font-family="Arial, sans-serif" font-size="12">

  <!-- White background -->
  <rect width="1100" height="860" fill="white"/>

  <!-- Title -->
  <text x="550" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="black">报修工单闭环顺序图</text>

  <!-- ===== Lifeline Headers ===== -->
  <!-- 业主端 x=60 -->
  <rect x="10"  y="45" width="90"  height="34" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="55"  y="67" text-anchor="middle" fill="black">业主端</text>

  <!-- Gateway x=165 -->
  <rect x="120" y="45" width="90"  height="34" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="165" y="67" text-anchor="middle" fill="black">Gateway</text>

  <!-- workorder-service x=310 -->
  <rect x="240" y="45" width="140" height="34" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="310" y="67" text-anchor="middle" fill="black">workorder-service</text>

  <!-- house-service x=460 -->
  <rect x="410" y="45" width="100" height="34" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="460" y="67" text-anchor="middle" fill="black">house-service</text>

  <!-- RabbitMQ x=610 -->
  <rect x="560" y="45" width="100" height="34" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="610" y="67" text-anchor="middle" fill="black">RabbitMQ</text>

  <!-- system-service x=750 -->
  <rect x="700" y="45" width="110" height="34" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="755" y="67" text-anchor="middle" fill="black">system-service</text>

  <!-- property-service x=900 -->
  <rect x="850" y="45" width="110" height="34" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="905" y="67" text-anchor="middle" fill="black">property-service</text>

  <!-- 管理员端 x=1040 -->
  <rect x="990" y="45" width="90"  height="34" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="1035" y="67" text-anchor="middle" fill="black">管理员端</text>

  <!-- ===== Lifelines ===== -->
  <line x1="55"   y1="79" x2="55"   y2="840" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="165"  y1="79" x2="165"  y2="840" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="310"  y1="79" x2="310"  y2="840" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="460"  y1="79" x2="460"  y2="840" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="610"  y1="79" x2="610"  y2="840" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="755"  y1="79" x2="755"  y2="840" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="905"  y1="79" x2="905"  y2="840" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="1035" y1="79" x2="1035" y2="840" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ===== Activation Boxes ===== -->
  <rect x="51"   y="110" width="8" height="720" fill="white" stroke="black" stroke-width="1"/>
  <rect x="161"  y="130" width="8" height="80"  fill="white" stroke="black" stroke-width="1"/>
  <rect x="306"  y="150" width="8" height="620" fill="white" stroke="black" stroke-width="1"/>
  <rect x="456"  y="180" width="8" height="40"  fill="white" stroke="black" stroke-width="1"/>
  <rect x="606"  y="250" width="8" height="120" fill="white" stroke="black" stroke-width="1"/>
  <rect x="751"  y="310" width="8" height="80"  fill="white" stroke="black" stroke-width="1"/>
  <rect x="901"  y="360" width="8" height="40"  fill="white" stroke="black" stroke-width="1"/>
  <rect x="1031" y="470" width="8" height="280" fill="white" stroke="black" stroke-width="1"/>

  <!-- ===== Step 1: 业主端 → Gateway ===== -->
  <line x1="59" y1="130" x2="161" y2="130" stroke="black" stroke-width="1.5"/>
  <polygon points="161,126 161,134 171,130" fill="black"/>
  <text x="110" y="123" text-anchor="middle" fill="black" font-size="11">POST /api/repair/submit</text>

  <!-- Gateway → workorder-service -->
  <line x1="169" y1="150" x2="306" y2="150" stroke="black" stroke-width="1.5"/>
  <polygon points="306,146 306,154 316,150" fill="black"/>
  <text x="237" y="143" text-anchor="middle" fill="black" font-size="11">转发请求</text>

  <!-- workorder-service → house-service (Feign) -->
  <line x1="314" y1="180" x2="456" y2="180" stroke="black" stroke-width="1.5"/>
  <polygon points="456,176 456,184 466,180" fill="black"/>
  <text x="385" y="173" text-anchor="middle" fill="black" font-size="11">Feign: GET /api/house/inner/{houseId}</text>

  <!-- house-service → workorder-service return -->
  <line x1="456" y1="220" x2="314" y2="220" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="314,216 314,224 304,220" fill="black"/>
  <text x="385" y="213" text-anchor="middle" fill="black" font-size="11">返回房屋信息</text>

  <!-- workorder-service 写入 Repair(status=pending) note -->
  <rect x="320" y="228" width="190" height="22" fill="white" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="415" y="243" text-anchor="middle" fill="black" font-size="10">写入 Repair（status=pending）</text>

  <!-- Gateway → 业主端 return -->
  <line x1="161" y1="210" x2="59" y2="210" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="59,206 59,214 49,210" fill="black"/>
  <text x="110" y="203" text-anchor="middle" fill="black" font-size="11">返回提交成功</text>

  <!-- ===== Step 2: workorder-service → RabbitMQ ===== -->
  <line x1="314" y1="265" x2="606" y2="265" stroke="black" stroke-width="1.5"/>
  <polygon points="606,261 606,269 616,265" fill="black"/>
  <text x="460" y="258" text-anchor="middle" fill="black" font-size="11">convertAndSend(smart.repair.exchange, repair.submit, RepairMsgDTO)</text>

  <!-- ===== Step 3: RabbitMQ 路由 note ===== -->
  <rect x="560" y="272" width="100" height="30" fill="white" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="610" y="284" text-anchor="middle" fill="black" font-size="10">路由到队列</text>
  <text x="610" y="296" text-anchor="middle" fill="black" font-size="10">repair.submit.queue</text>

  <!-- ===== Step 4: RabbitMQ → system-service ===== -->
  <line x1="614" y1="315" x2="751" y2="315" stroke="black" stroke-width="1.5"/>
  <polygon points="751,311 751,319 761,315" fill="black"/>
  <text x="682" y="308" text-anchor="middle" fill="black" font-size="11">消费消息（@RabbitListener）</text>

  <!-- system-service Redis 幂等 note -->
  <rect x="762" y="322" width="175" height="22" fill="white" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="849" y="337" text-anchor="middle" fill="black" font-size="10">Redis setIfAbsent(mq:repair:submit:{repairId})</text>

  <!-- system-service → property-service (Feign 通知) -->
  <line x1="759" y1="355" x2="901" y2="355" stroke="black" stroke-width="1.5"/>
  <polygon points="901,351 901,359 911,355" fill="black"/>
  <text x="830" y="348" text-anchor="middle" fill="black" font-size="11">Feign: POST /api/notice/inner（报修受理通知）</text>

  <!-- property-service → system-service return -->
  <line x1="901" y1="400" x2="759" y2="400" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="759,396 759,404 749,400" fill="black"/>
  <text x="830" y="393" text-anchor="middle" fill="black" font-size="11">通知发送成功</text>

  <!-- ===== Step 5: 管理员端 → workorder-service 更新状态 processing ===== -->
  <line x1="1031" y1="470" x2="314" y2="470" stroke="black" stroke-width="1.5"/>
  <polygon points="314,466 314,474 304,470" fill="black"/>
  <text x="672" y="463" text-anchor="middle" fill="black" font-size="11">POST /api/repair/admin/updateStatus?status=processing</text>

  <!-- workorder-service 状态变 processing note -->
  <rect x="320" y="477" width="175" height="22" fill="white" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="407" y="492" text-anchor="middle" fill="black" font-size="10">Repair 状态变 processing</text>

  <!-- ===== Step 6: workorder-service 自动生成工单 ===== -->
  <rect x="320" y="507" width="195" height="22" fill="white" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="417" y="522" text-anchor="middle" fill="black" font-size="10">createFromRepair(repairId) → WorkOrder(PENDING)</text>

  <!-- ===== Step 7: 管理员端 → workorder-service 派单 ===== -->
  <line x1="1031" y1="550" x2="314" y2="550" stroke="black" stroke-width="1.5"/>
  <polygon points="314,546 314,554 304,550" fill="black"/>
  <text x="672" y="543" text-anchor="middle" fill="black" font-size="11">POST /api/workorder/admin/assign（派单，指定维修员）</text>

  <!-- workorder-service 工单变 ASSIGNED note -->
  <rect x="320" y="557" width="175" height="22" fill="white" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="407" y="572" text-anchor="middle" fill="black" font-size="10">WorkOrder 状态变 ASSIGNED</text>

  <!-- 管理员端 return -->
  <line x1="314" y1="590" x2="1031" y2="590" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="1031,586 1031,594 1041,590" fill="black"/>
  <text x="672" y="583" text-anchor="middle" fill="black" font-size="11">返回操作成功</text>

  <!-- ===== Step 8a: 维修员 开始处理 ===== -->
  <!-- 维修员端 lifeline header (复用业主端位置，用注释标注) -->
  <!-- 用业主端生命线代表维修员端，加文字说明 -->
  <text x="55" y="618" text-anchor="middle" fill="black" font-size="10" font-style="italic">维修员端</text>
  <line x1="59" y1="625" x2="306" y2="625" stroke="black" stroke-width="1.5"/>
  <polygon points="306,621 306,629 316,625" fill="black"/>
  <text x="182" y="618" text-anchor="middle" fill="black" font-size="11">POST /api/workorder/worker/start</text>

  <!-- workorder-service 工单变 PROCESSING note -->
  <rect x="320" y="632" width="175" height="22" fill="white" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="407" y="647" text-anchor="middle" fill="black" font-size="10">WorkOrder 状态变 PROCESSING</text>

  <!-- ===== Step 8b: 维修员 完成 ===== -->
  <line x1="59" y1="675" x2="306" y2="675" stroke="black" stroke-width="1.5"/>
  <polygon points="306,671 306,679 316,675" fill="black"/>
  <text x="182" y="668" text-anchor="middle" fill="black" font-size="11">POST /api/workorder/worker/complete</text>

  <!-- workorder-service 工单变 COMPLETED + Repair completed note -->
  <rect x="320" y="682" width="210" height="34" fill="white" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="425" y="696" text-anchor="middle" fill="black" font-size="10">WorkOrder 状态变 COMPLETED</text>
  <text x="425" y="710" text-anchor="middle" fill="black" font-size="10">同步 Repair 状态变 completed（闭环）</text>

  <!-- return to 维修员端 -->
  <line x1="306" y1="730" x2="59" y2="730" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="59,726 59,734 49,730" fill="black"/>
  <text x="182" y="723" text-anchor="middle" fill="black" font-size="11">返回操作成功</text>

  <!-- ===== Step labels ===== -->
  <text x="10" y="128"  fill="black" font-size="11" font-weight="bold">①</text>
  <text x="10" y="148"  fill="black" font-size="11" font-weight="bold">②</text>
  <text x="10" y="178"  fill="black" font-size="11" font-weight="bold">③</text>
  <text x="10" y="263"  fill="black" font-size="11" font-weight="bold">④</text>
  <text x="10" y="313"  fill="black" font-size="11" font-weight="bold">⑤</text>
  <text x="10" y="468"  fill="black" font-size="11" font-weight="bold">⑥</text>
  <text x="10" y="505"  fill="black" font-size="11" font-weight="bold">⑦</text>
  <text x="10" y="548"  fill="black" font-size="11" font-weight="bold">⑧</text>
  <text x="10" y="623"  fill="black" font-size="11" font-weight="bold">⑨</text>
  <text x="10" y="673"  fill="black" font-size="11" font-weight="bold">⑩</text>

</svg>
