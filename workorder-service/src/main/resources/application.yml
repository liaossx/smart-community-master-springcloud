spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:192.168.10.101}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    publisher-confirm-type: correlated
    publisher-returns: true

mybatis-plus:
  mapper-locations: classpath*:com/lsx/workorder/*/mapper/*.xml
  type-aliases-package: com.lsx.workorder.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    root: info
    com.lsx.workorder.mapper: debug

knife4j:
  enable: true
  setting:
    language: zh-CN
  openapi:
    title: 工单服务 API
    description: 报修工单提交、处理、统计
    version: 1.0

jwt:
  secret: "mySecretKeyForJWTGenerationInSmartCommunitySystem2024"
  expiration: 86400000
