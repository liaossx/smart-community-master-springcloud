server:
  port: 8084

spring:
  application:
    name: parking-service
  config:
    import:
      - optional:nacos:parking-service.yaml?group=DEFAULT_GROUP&refresh=true
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.10.101:8848
      config:
        server-addr: 192.168.10.101:8848
        file-extension: yaml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.10.101:3306/smart_community?useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2B8&useSSL=false
    username: root
    password: 1234
  redis:
    host: 192.168.10.101
    port: 6379
    password: 1234
    timeout: 10000
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: 3000ms

mybatis-plus:
  mapper-locations: classpath*:com/lsx/parking/mapper/*.xml
  type-aliases-package: com.lsx.parking.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    root: info
    com.lsx.parking.mapper: debug

knife4j:
  enable: true
  setting:
    language: zh-CN
  openapi:
    title: 智慧停车服务 API
    description: 车位、车辆、停车费、道闸管理
    version: 1.0
    contact:
      name: lsx
      email: 2428513271@qq.com

jwt:
  secret: "mySecretKeyForJWTGenerationInSmartCommunitySystem2024"
  expiration: 86400000
