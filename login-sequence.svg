<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="720" viewBox="0 0 900 720" font-family="Arial, sans-serif" font-size="13">

  <!-- White background -->
  <rect width="900" height="720" fill="white"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="black">登录业务顺序图</text>

  <!-- ===== Lifeline Headers ===== -->
  <!-- Client -->
  <rect x="30" y="50" width="100" height="36" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="80" y="73" text-anchor="middle" fill="black">客户端</text>

  <!-- UserController -->
  <rect x="190" y="50" width="120" height="36" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="250" y="73" text-anchor="middle" fill="black">UserController</text>

  <!-- UserService -->
  <rect x="380" y="50" width="120" height="36" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="440" y="73" text-anchor="middle" fill="black">UserService</text>

  <!-- UserMapper -->
  <rect x="565" y="50" width="110" height="36" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="620" y="73" text-anchor="middle" fill="black">UserMapper</text>

  <!-- JwtUtil -->
  <rect x="740" y="50" width="100" height="36" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="790" y="73" text-anchor="middle" fill="black">JwtUtil</text>

  <!-- ===== Lifelines (dashed vertical lines) ===== -->
  <line x1="80"  y1="86"  x2="80"  y2="700" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="250" y1="86"  x2="250" y2="700" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="440" y1="86"  x2="440" y2="700" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="620" y1="86"  x2="620" y2="700" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="790" y1="86"  x2="790" y2="700" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ===== Activation Boxes ===== -->
  <!-- Client active: 120-680 -->
  <rect x="76"  y="120" width="8"  height="560" fill="white" stroke="black" stroke-width="1"/>
  <!-- Controller active: 140-640 -->
  <rect x="246" y="140" width="8"  height="500" fill="white" stroke="black" stroke-width="1"/>
  <!-- Service active: 200-600 -->
  <rect x="436" y="200" width="8"  height="380" fill="white" stroke="black" stroke-width="1"/>
  <!-- Mapper active: 260-320 -->
  <rect x="616" y="260" width="8"  height="80"  fill="white" stroke="black" stroke-width="1"/>
  <!-- JwtUtil active 1: 360-400 -->
  <rect x="786" y="360" width="8"  height="40"  fill="white" stroke="black" stroke-width="1"/>
  <!-- JwtUtil active 2: 440-480 -->
  <rect x="786" y="440" width="8"  height="40"  fill="white" stroke="black" stroke-width="1"/>

  <!-- ===== Messages ===== -->

  <!-- 1. Client -> Controller: POST /api/user/login {username, password, role} -->
  <line x1="84" y1="140" x2="246" y2="140" stroke="black" stroke-width="1.5"/>
  <polygon points="246,136 246,144 256,140" fill="black"/>
  <text x="165" y="133" text-anchor="middle" fill="black" font-size="11">POST /api/user/login</text>
  <text x="165" y="147" text-anchor="middle" fill="black" font-size="10">{username, password, role}</text>

  <!-- 2. Controller -> Service: login(LoginDto) -->
  <line x1="254" y1="200" x2="436" y2="200" stroke="black" stroke-width="1.5"/>
  <polygon points="436,196 436,204 446,200" fill="black"/>
  <text x="345" y="193" text-anchor="middle" fill="black" font-size="11">login(LoginDto)</text>

  <!-- 3. Service -> Mapper: findByUsername(username) -->
  <line x1="444" y1="260" x2="616" y2="260" stroke="black" stroke-width="1.5"/>
  <polygon points="616,256 616,264 626,260" fill="black"/>
  <text x="530" y="253" text-anchor="middle" fill="black" font-size="11">findByUsername(username)</text>

  <!-- 4. Mapper -> Service: return User / null -->
  <line x1="616" y1="340" x2="444" y2="340" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="444,336 444,344 434,340" fill="black"/>
  <text x="530" y="333" text-anchor="middle" fill="black" font-size="11">返回 User 对象</text>

  <!-- 5. [用户不存在] alt box label -->
  <rect x="60" y="355" width="820" height="1" fill="none" stroke="black" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="70" y="370" fill="black" font-size="10">[用户不存在] 抛出异常: 用户名或密码错误</text>

  <!-- 6. Service -> JwtUtil: validatePassword(raw, encoded) -->
  <line x1="444" y1="390" x2="786" y2="390" stroke="black" stroke-width="1.5"/>
  <polygon points="786,386 786,394 796,390" fill="black"/>
  <text x="615" y="383" text-anchor="middle" fill="black" font-size="11">validatePassword(raw, encoded)</text>

  <!-- 7. JwtUtil -> Service: return true/false -->
  <line x1="786" y1="400" x2="444" y2="400" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="444,396 444,404 434,400" fill="black"/>
  <text x="615" y="413" text-anchor="middle" fill="black" font-size="11">返回 true / false</text>

  <!-- 8. [密码错误] -->
  <rect x="60" y="425" width="820" height="1" fill="none" stroke="black" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="70" y="438" fill="black" font-size="10">[密码错误] 抛出异常: 用户名或密码错误</text>

  <!-- 9. Service -> JwtUtil: generateToken(userId, username, role, communityId) -->
  <line x1="444" y1="460" x2="786" y2="460" stroke="black" stroke-width="1.5"/>
  <polygon points="786,456 786,464 796,460" fill="black"/>
  <text x="615" y="453" text-anchor="middle" fill="black" font-size="11">generateToken(userId, username, role, communityId)</text>

  <!-- 10. JwtUtil -> Service: return JWT Token -->
  <line x1="786" y1="480" x2="444" y2="480" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="444,476 444,484 434,480" fill="black"/>
  <text x="615" y="493" text-anchor="middle" fill="black" font-size="11">返回 JWT Token (24h)</text>

  <!-- 11. Service -> Controller: return LoginResult -->
  <line x1="436" y1="540" x2="254" y2="540" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="254,536 254,544 244,540" fill="black"/>
  <text x="345" y="533" text-anchor="middle" fill="black" font-size="11">返回 LoginResult</text>
  <text x="345" y="547" text-anchor="middle" fill="black" font-size="10">{userId, username, token, role, communityId}</text>

  <!-- 12. Controller -> Client: 200 OK + LoginResult -->
  <line x1="246" y1="600" x2="84" y2="600" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="84,596 84,604 74,600" fill="black"/>
  <text x="165" y="593" text-anchor="middle" fill="black" font-size="11">HTTP 200 OK</text>
  <text x="165" y="607" text-anchor="middle" fill="black" font-size="10">{token, userId, role, communityId}</text>

  <!-- 13. Client stores token note -->
  <rect x="30" y="625" width="140" height="30" fill="white" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="100" y="638" text-anchor="middle" fill="black" font-size="10">客户端存储 Token</text>
  <text x="100" y="650" text-anchor="middle" fill="black" font-size="10">后续请求携带 Bearer</text>
  <line x1="80" y1="625" x2="80" y2="600" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Step numbers -->
  <text x="62" y="138" fill="black" font-size="10" font-weight="bold">①</text>
  <text x="232" y="198" fill="black" font-size="10" font-weight="bold">②</text>
  <text x="422" y="258" fill="black" font-size="10" font-weight="bold">③</text>
  <text x="422" y="338" fill="black" font-size="10" font-weight="bold">④</text>
  <text x="422" y="388" fill="black" font-size="10" font-weight="bold">⑤</text>
  <text x="422" y="398" fill="black" font-size="10" font-weight="bold">⑥</text>
  <text x="422" y="458" fill="black" font-size="10" font-weight="bold">⑦</text>
  <text x="422" y="478" fill="black" font-size="10" font-weight="bold">⑧</text>
  <text x="232" y="538" fill="black" font-size="10" font-weight="bold">⑨</text>
  <text x="62"  y="598" fill="black" font-size="10" font-weight="bold">⑩</text>

</svg>
