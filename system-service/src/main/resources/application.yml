mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.lsx.system: debug

feign:
  sentinel:
    enabled: true

spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:192.168.10.101}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 1

  cloud:
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8080}
        port: ${SENTINEL_TRANSPORT_PORT:8719}
      datasource:
        param-flow:
          nacos:
            server-addr: ${spring.cloud.nacos.discovery.server-addr}
            data-id: sentinel-system-param-flow-rules
            group-id: DEFAULT_GROUP
            data-type: json
            rule-type: param-flow
        degrade:
          nacos:
            server-addr: ${spring.cloud.nacos.discovery.server-addr}
            data-id: sentinel-system-degrade-rules
            group-id: DEFAULT_GROUP
            data-type: json
            rule-type: degrade
