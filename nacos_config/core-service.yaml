spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据库连接，默认指向 smart_community
    url: jdbc:mysql://192.168.10.101:3306/smart_community?useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2B8&useSSL=false
    username: root
    password: ${MYSQL_PASSWORD:1234}
  redis:
    host: 192.168.10.101
    port: 6379
    password: ${REDIS_PASSWORD:1234}
    timeout: 10000
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: 3000ms
  cloud:
    sentinel:
      transport:
        dashboard: 192.168.10.101:8858
        port: 8719
      eager: true

mybatis-plus:
  # 修正包名路径：指向各模块下的 mapper XML
  mapper-locations: classpath*:com/lsx/*/mapper/*.xml
  # 修正实体包名：去掉多余的 core
  type-aliases-package: com.lsx.user.entity,com.lsx.house.entity,com.lsx.workorder.repair.entity,com.lsx.system.entity,com.lsx.property.property.entity,com.lsx.community.activity.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    root: info
    # 修正包名：com.sky -> com.lsx
    com.lsx: debug
    com.lsx.core.mapper: debug

knife4j:
  enable: true
  setting:
    language: zh-CN
  openapi:
    title: 智慧社区管理系统 API
    description: 基于 Spring Cloud Alibaba 的智慧社区微服务系统
    version: 1.0
    contact:
      name: lsx
      email: 2428513271@qq.com

jwt:
  secret: "mySecretKeyForJWTGenerationInSmartCommunitySystem2024"
  expiration: 86400000

internal:
  token: ${INTERNAL_TOKEN:dev-internal-token}

mock:
  payment:
    enabled: ${MOCK_PAYMENT_ENABLED:false}

payment:
  secret: ${PAYMENT_SECRET:dev-payment-secret}
  allowedSkewSeconds: ${PAYMENT_ALLOWED_SKEW_SECONDS:300}
